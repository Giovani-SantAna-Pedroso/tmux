
### VARIABLES ###
set $mod Mod4
set $terminal kitty
set $fileManager nemo
set $menu wofi --show drun

### MONITORS (ULTRA MODE) ###
# Laptop on the right, ultrawide on the left
output eDP-1 resolution 1920x1080 position 2560,0
output HDMI-A-1 resolution 2560x1080 position 0,0

### INPUT ###
input type:keyboard {
    xkb_layout br
    xkb_variant abnt2
}

input type:touchpad {
    natural_scroll disabled
}

### APPEARANCE ###
gaps inner 4
gaps outer 4
default_border pixel 1

### STARTUP ###
exec_always sunshine
exec_always waybar
exec firefox
exec wpaperd
exec lxqt-policykit-agent
exec nm-applet
exec otd-daemon
exec modprobe v4l2loopback
exec thunderbird

### TERMINAL / APPS ###
bindsym $mod+Return exec $terminal
bindsym $mod+Shift+q kill
bindsym $mod+o exec $fileManager
bindsym $mod+x exec xournalpp
bindsym $mod+d exec $menu
bindsym $mod+v floating toggle
bindsym $mod+f fullscreen

### FOCUS MOVEMENT ###
bindsym $mod+h focus left
bindsym $mod+j focus down
bindsym $mod+k focus up
bindsym $mod+l focus right

bindsym $mod+Left focus left
bindsym $mod+Right focus right
bindsym $mod+Up focus up
bindsym $mod+Down focus down

### MOVE WINDOWS ###
bindsym $mod+Shift+h move left
bindsym $mod+Shift+j move down
bindsym $mod+Shift+k move up
bindsym $mod+Shift+l move right

### WORKSPACES ###
bindsym $mod+1 workspace 1
bindsym $mod+2 workspace 2
bindsym $mod+3 workspace 3
bindsym $mod+4 workspace 4
bindsym $mod+5 workspace 5
bindsym $mod+6 workspace 6
bindsym $mod+7 workspace 7
bindsym $mod+8 workspace 8
bindsym $mod+9 workspace 9
bindsym $mod+0 workspace 10

### MOVE TO WORKSPACE ###
bindsym $mod+Shift+1 move container to workspace 1
bindsym $mod+Shift+2 move container to workspace 2
bindsym $mod+Shift+3 move container to workspace 3
bindsym $mod+Shift+4 move container to workspace 4
bindsym $mod+Shift+5 move container to workspace 5
bindsym $mod+Shift+6 move container to workspace 6
bindsym $mod+Shift+7 move container to workspace 7
bindsym $mod+Shift+8 move container to workspace 8
bindsym $mod+Shift+9 move container to workspace 9
bindsym $mod+Shift+0 move container to workspace 10

### SCRATCHPAD ###
bindsym $mod+s scratchpad show
bindsym $mod+Shift+s move scratchpad

### MOUSE ###
floating_modifier $mod

### SCREENSHOT ###
bindsym Print exec grimshot --notify save area ~/Pictures/Screenshots/$(date +%s).png

### MEDIA KEYS ###
bindsym XF86AudioPlay exec mpc toggle
bindsym XF86AudioStop exec mpc stop
bindsym XF86AudioPrev exec mpc prev && mpc play
bindsym XF86AudioNext exec mpc next && mpc play

### VOLUME ###
bindsym XF86AudioLowerVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
bindsym XF86AudioRaiseVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%+
bindsym Shift+XF86AudioLowerVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindsym Shift+XF86AudioRaiseVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindsym XF86AudioMute exec wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindsym XF86AudioMicMute exec wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

### BRIGHTNESS ###
bindsym XF86MonBrightnessUp exec brightnessctl set +10%
bindsym XF86MonBrightnessDown exec brightnessctl set 10%-

### TABLET ###
bindsym $mod+F5 exec otd loadsettings ~/.config/OpenTabletDriver/Presets/note_primarny_monitor_hypr.json && notify-send "Tablet set to notebook screen"
bindsym $mod+F6 exec otd loadsettings ~/.config/OpenTabletDriver/Presets/room_ultrawide_left_hypr.json && notify-send "Tablet set to left side"
bindsym $mod+F7 exec otd loadsettings ~/.config/OpenTabletDriver/Presets/room_ultrawide_right_hypr.json && notify-send "Tablet set to right side"
